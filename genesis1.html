<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis 1 — Hebrew Pictograph Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Frank+Ruhl+Libre:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5edda;
    --parchment-dark: #e8d9b8;
    --gold: #8B6914;
    --gold-light: #c4972a;
    --terracotta: #7a3b2e;
    --faded: #9e8b6e;
    --white: #fdfaf3;
    --highlight: #fff3cd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: 'בְּרֵאשִׁית בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 1.8rem; opacity: 0.06; white-space: nowrap; pointer-events: none;
    direction: rtl; width: 100%; text-align: center;
  }
  header h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.15em; position: relative; }
  header p { color: var(--gold-light); font-style: italic; margin-top: 0.3rem; position: relative; }

  /* CONTROLS */
  .controls {
    background: var(--parchment-dark);
    border-bottom: 2px solid var(--gold);
    padding: 0.8rem 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--faded);
    letter-spacing: 0.1em;
  }
  .toggle-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 0.3rem 0.9rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .toggle-btn.on { background: var(--gold); color: var(--white); }

  /* MAIN */
  main { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* VERSE BLOCK */
  .verse-block {
    margin-bottom: 2.5rem;
    background: var(--white);
    border-left: 3px solid var(--gold);
    padding: 1.5rem;
  }
  .verse-ref {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--faded);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .verse-kjv {
    font-style: italic;
    color: var(--faded);
    font-size: 0.95rem;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--parchment-dark);
    line-height: 1.6;
  }

  /* WORD ROW */
  .word-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    direction: rtl;
    text-align: center;
  }

  /* WORD CARD */
  .word-card {
    background: var(--parchment);
    border: 1px solid var(--parchment-dark);
    padding: 0.6rem 0.5rem 0.5rem;
    min-width: 70px;
    cursor: pointer;
    transition: all 0.15s;
    direction: rtl;
    position: relative;
  }
  .word-card:hover { border-color: var(--gold); background: var(--highlight); }
  .word-card.active { border-color: var(--terracotta); background: var(--highlight); }

  /* Hebrew word at top */
  .w-hebrew {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--terracotta);
    display: block;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  /* Letter breakdown row */
  .w-letters {
    display: flex;
    flex-direction: row;
    gap: 2px;
    justify-content: center;
    margin-bottom: 0.3rem;
    flex-wrap: wrap;
  }
  .w-letter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    min-width: 18px;
  }
  .w-pic   { font-size: 0.9rem; line-height: 1; }
  .w-phoen { font-size: 0.75rem; color: var(--faded); line-height: 1; }
  .w-lheb  { font-size: 1rem; color: var(--ink); font-weight: 600; line-height: 1; }

  /* Transliteration + English */
  .w-trans {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--gold);
    display: block;
    margin-top: 0.3rem;
    letter-spacing: 0.03em;
    direction: ltr;
  }
  .w-eng {
    font-size: 0.75rem;
    color: var(--faded);
    font-style: italic;
    display: block;
    direction: ltr;
    line-height: 1.2;
  }

  /* EXPANDED DETAIL */
  .word-detail {
    display: none;
    background: var(--ink);
    color: var(--parchment);
    padding: 1rem 1.2rem;
    margin-top: 1rem;
    direction: ltr;
    animation: fadeIn 0.15s ease;
  }
  .word-detail.open { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .detail-heb { font-family: 'Frank Ruhl Libre', serif; font-size: 2rem; color: var(--gold-light); font-weight: 700; }
  .detail-trans { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--faded); margin-top: 0.2rem; }
  .detail-eng { font-style: italic; margin-top: 0.2rem; }
  .detail-letters { display: flex; gap: 1rem; margin-top: 0.8rem; flex-wrap: wrap; }
  .detail-letter {
    text-align: center;
    background: rgba(255,255,255,0.05);
    padding: 0.5rem 0.7rem;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 60px;
  }
  .dl-pic   { font-size: 1.5rem; }
  .dl-phoen { font-size: 1.1rem; color: var(--faded); }
  .dl-heb   { font-size: 1.6rem; color: var(--gold-light); font-weight: 600; }
  .dl-name  { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--faded); margin-top: 0.2rem; }

  /* SHOW/HIDE toggles */
  body.hide-pics    .w-pic,    body.hide-pics    .dl-pic    { visibility: hidden; }
  body.hide-phoen   .w-phoen,  body.hide-phoen   .dl-phoen  { visibility: hidden; }
  body.hide-trans   .w-trans                                 { visibility: hidden; }
  body.hide-eng     .w-eng,    body.hide-eng     .detail-eng { visibility: hidden; }

  /* JUMP NAV */
  .verse-jump {
    position: sticky; top: 0; z-index: 10;
    background: var(--parchment-dark);
    border-bottom: 1px solid var(--gold);
    padding: 0.5rem 1rem;
    display: flex; flex-wrap: wrap; gap: 0.3rem;
  }
  .verse-jump a {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--gold);
    text-decoration: none;
    padding: 0.2rem 0.5rem;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .verse-jump a:hover { border-color: var(--gold); }

  @media (max-width: 600px) {
    .w-pic { font-size: 0.75rem; }
    .w-lheb { font-size: 0.85rem; }
    .word-card { min-width: 55px; padding: 0.4rem 0.3rem; }
  }

  /* NARRATIVE */
  .detail-narrative {
    margin-top: 1rem;
    padding-top: 0.8rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-style: italic;
    color: var(--gold-light);
    font-size: 1rem;
    line-height: 1.6;
    min-height: 1.5rem;
  }


</style>
</head>

</div>

let activeDetail = null;

// Build nav
const nav = document.getElementById('verse-jump');
genesis1.forEach(v => {
  const a = document.createElement('a');
  a.href = '#v' + v.verse;
  a.textContent = 'v.' + v.verse;
  nav.appendChild(a);
});

// Build verses
const main = document.getElementById('main');
genesis1.forEach(vdata => {
  const block = document.createElement('div');
  block.className = 'verse-block';
  block.id = 'v' + vdata.verse;

  const ref = document.createElement('div');
  ref.className = 'verse-ref';
  ref.textContent = vdata.ref;

  const kjv = document.createElement('div');
  kjv.className = 'verse-kjv';
  kjv.textContent = '"' + vdata.kjv + '"';

  const wordRow = document.createElement('div');
  wordRow.className = 'word-row';

  // detail panel (shared per verse)
  const detail = document.createElement('div');
  detail.className = 'word-detail';

  vdata.words.forEach((word, wi) => {
    const card = document.createElement('div');
    card.className = 'word-card';

    const hebSpan = document.createElement('span');
    hebSpan.className = 'w-hebrew';
    hebSpan.textContent = word.heb;

    const lettersDiv = document.createElement('div');
    lettersDiv.className = 'w-letters';
    word.letters.forEach(l => {
      const ld = document.createElement('div');
      ld.className = 'w-letter';
      ld.innerHTML = `<span class="w-pic">${l.p}</span><span class="w-phoen">${l.ph}</span><span class="w-lheb">${l.h}</span>`;
      lettersDiv.appendChild(ld);
    });

    const transSpan = document.createElement('span');
    transSpan.className = 'w-trans';
    transSpan.textContent = word.trans;

    const engSpan = document.createElement('span');
    engSpan.className = 'w-eng';
    engSpan.textContent = word.eng;

    card.appendChild(hebSpan);
    card.appendChild(lettersDiv);
    card.appendChild(transSpan);
    card.appendChild(engSpan);

    card.onclick = () => {
      const isOpen = card.classList.contains('active');
      // close all
      document.querySelectorAll('.word-card.active').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.word-detail.open').forEach(d => { d.classList.remove('open'); d.innerHTML = ''; });

      if (!isOpen) {
        card.classList.add('active');
        const nid = 'nar-' + vdata.verse + '-' + wi;
        detail.innerHTML = `
          <div class="detail-heb">${word.heb}</div>
          <div class="detail-trans">${word.trans}</div>
          <div class="detail-eng">${word.eng}</div>
          <div class="detail-letters">
            ${word.letters.map(l => `
              <div class="detail-letter">
                <div class="dl-pic">${l.p}</div>
                <div class="dl-phoen">${l.ph}</div>
                <div class="dl-heb">${l.h}</div>
                <div class="dl-name">${l.n}</div>
              </div>
            `).join('')}
          </div>
          <div class="detail-narrative" id="${nid}">
            <span class="narrative-loading">Reading the pictures…</span>
          </div>
        `;
        detail.classList.add('open');
        const narEl = document.getElementById(nid);
        if (narEl) {
          const narText = narratives[word.heb];
          narEl.innerHTML = narText
            ? narText
            : '<span style="color:var(--faded);font-size:0.85rem">—</span>';
        }
      }
    };

    wordRow.appendChild(card);
  });

  block.appendChild(ref);
  block.appendChild(kjv);
  block.appendChild(wordRow);
  block.appendChild(detail);
  main.appendChild(block);
});
